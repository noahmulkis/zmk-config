CONFIG_ZMK_SPLIT=y
```

---

**What each line does:**
- `CONFIG_ZMK_SPLIT` — enables split keyboard mode
- `CONFIG_ZMK_SPLIT_ROLE_CENTRAL` — makes the left half the "brain" that connects to your PC/phone
- `CONFIG_BT_CTLR_TX_PWR_PLUS_8` — boosts Bluetooth transmit power for a more reliable connection between the halves (optional but recommended)

---

Your `config/` folder should now look like this:
```
config/
├── killerkeys_left.conf
└── killerkeys_right.conf